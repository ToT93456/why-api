services:
  - type: web
    name: lua-script-api
    runtime: node
    rootDir: .
    plan: free
    buildCommand: npm install --include=dev && npm --workspace apps/api run db:generate && npm --workspace apps/api run build
    startCommand: npm --workspace apps/api run start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: lua-script-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://lua-script-web.onrender.com
  - type: web
    name: lua-script-web
    runtime: node
    rootDir: .
    plan: free
    buildCommand: npm install --include=dev && npm --workspace apps/web run build
    startCommand: npm --workspace apps/web run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://lua-script-api.onrender.com

databases:
  - name: lua-script-db
    databaseName: lua_script_hub
    plan: free
